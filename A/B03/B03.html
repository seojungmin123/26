<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .square{
            width: 100px;
            height: 100px;
            background-color: black;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div class="square"></div>
    <script>
        const square = document.querySelector('.square');
        let t = 0;
        let l = 0;
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };
        document.addEventListener('keydown',(e) =>{
            if (e.key in keys) keys[e.key]=true;
            move();
        })
        document.addEventListener('keyup',(e) =>{
            if (e.key in keys) keys[e.key]=false;
        })
        const move = ()=>{
            if (keys.ArrowUp) t -= 10;
            if (keys.ArrowDown) t += 10; 
            if (keys.ArrowLeft) l -= 10; 
            if (keys.ArrowRight) l += 10;

            const maxL = window.innerWidth / 2 - 50;
            const maxT = window.innerHeight / 2 - 50;

            if (l > maxL) l = maxL;
            if (l < -maxL) l = -maxL;
            if (t > maxT) t = maxT;
            if (t < -maxT) t = -maxT;

            square.style.transform = `translate(calc(-50% + ${l}px),calc(-50% + ${t}px))`;
        }
    </script>
</body>
</html>
