<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-size: 30px;
        }
        input{
            border-radius: 10px;
            border: 3px solid black;
            outline: none;
        }
        #wrap{
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <label for="p">비밀번호</label>
        <input type="password" id="#">
        <div class="st"></div>
    </div>
    <script>
        const pInput = document.querySelector('input');
        const st = document.querySelector('.st');
        
        pInput.addEventListener('input',()=>{
            const hasNum = /[0-9]/.test(pInput.value);
            const hasUpper = /[A-Z]/.test(pInput.value);
            const hasSpecial = /[^a-zA-Z0-9가-힣]/.test(pInput.value);

            if(hasSpecial && pInput.value.length >= 8){
                pInput.style.borderColor="green";
                st.style.color="green";
                st.textContent="강함";
            }else if(pInput.value.length >= 6 && hasNum && hasUpper){
                pInput.style.borderColor="orange";
                st.style.color="orange";
                st.textContent="보통";
            }else{
                pInput.style.borderColor="red";
                st.style.color="red";
                st.textContent="약함";
            }
        })
    </script>
</body>
</html>
