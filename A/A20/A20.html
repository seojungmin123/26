<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="A20.css">
</head>
<body>
    <input type="radio" name="book" id="p1" checked>
    <input type="radio" name="book" id="p2">
    <input type="radio" name="book" id="p3">
    <input type="radio" name="book" id="p4">
    <input type="radio" name="book" id="p5">

    <div class="flip-book">
        <div class="page1 page">
            <div class="front"></div>
            <div class="back"></div>
        </div>
        <div class="page2 page">
            <div class="front"></div>
            <div class="back"></div>
        </div>
        <div class="page3 page">
            <div class="front"></div>
            <div class="back"></div>
        </div>
        <div class="page4 page">
            <div class="front"></div>
            <div class="back"></div>
        </div>
        <div class="page5 page">
            <div class="front"></div>
            <div class="back"></div>
        </div>
        <div class="right"></div>

        <!-- 무한루프 포기 사람이 할짓아님 -->

        <div class="btns">
            <label for="p1" class="prev"><</label>
            <label for="p2" class="prev"><</label>
            <label for="p3" class="prev"><</label>
            <label for="p4" class="prev"><</label>
            <label for="p5" class="prev"><</label>

            <label for="p1" class="next">></label>
            <label for="p2" class="next">></label>
            <label for="p3" class="next">></label>
            <label for="p4" class="next">></label>
            <label for="p5" class="next">></label>
        </div>
    </div>
</div>
</body>
</html>
