<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            text-align: center;
            background-color: #eee;
            padding: 50px;
        }
        .container{
            display: inline-block;
            width: 500px;
            height: 200px;
            border: 3px dashed #aaa;
            border-radius: 10px;
            text-align: center;
            align-content: center;
            user-select: none;
        }
        #wrap{
            width: 500px;
            margin: 10px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        ul{
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        li{
            align-content: center;
            padding: 10px;
            text-align: left;
            list-style: none;
            width: 100%;
            height: 50px;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            user-select: none;
        }
        .dragover{
            background-color: rgb(211, 236, 245);
        }
        .dragging{
            border: 2px dashed rgb(176, 176, 184);
        }
        .dragover-item{
            border: 2px dashed blue;
        }
    </style>
</head>
<body>
    <h1>멀티 파일 업로드</h1>
    <div id="wrap">
        <input type="file" id="in">
        <label class="container" for="in">여기로 파일을 드래그하거나 클릭하여 선택하세요</label>
        <ul class="file-list">
        </ul>
    </div>
    <script src="B17.js"></script>
</body>
</html>
