<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="A08.css">
</head>
<body>
    <div class="cart">
        <h2>장바구니</h2>
        <ul>
            <li>
                <img src="images/tshirt.jpg" alt="">
                <div class="info">
                    <span>WorldSkills 공식 티셔츠</span>
                    <p>색상: 네이비</p>
                    <p>사이즈: L</p>
                </div>
                <div class="quantity">
                    <button class="decrease">-</button>
                    <Strong>2</Strong>
                    <button class="increase">+</button>
                </div>
                <div class="price">25,000원</div>
                <button class="del">X</button>
            </li>
            <li>
                <img src="images/book.jpg" alt="">
                <div class="info">
                    <span>기능경기 가이드북</span>
                    <p>종류: 웹디자인</p>
                    <p>2026년 최신판</p>
                </div>
                <div class="quantity">
                    <button class="decrease">-</button>
                    <Strong>1</Strong>
                    <button class="increase">+</button>
                </div>
                <div class="price">15,000원</div>
                <button class="del">X</button>
            </li>
            <li>
                <img src="images/laptop-case.jpg" alt="">
                <div class="info">
                    <span>WorldSkills 노트북 파우치</span>
                    <p>색상: 블랙</p>
                    <p>15인치 호환</p>
                </div>
                <div class="quantity">
                    <button class="decrease">-</button>
                    <Strong>1</Strong>
                    <button class="increase">+</button>
                </div>
                <div class="price">35,000원</div>
                <button class="del">X</button>
            </li>
        </ul>
        <div>
            <div>
                <p>상품금액</p>
                <p>75,000원</p>
            </div>
            <div>
                <p>배송비</p>
                <p>3,000원</p>
            </div>
            <hr>
            <div>
                <strong>총 결제금액</strong>
                <strong>78,000원</strong>
            </div>
        </div>
        <div class="btns">
            <button>쇼핑 계속하기</button>
            <button>주문하기</button>
        </div>
    </div>
</body>
</html>
