<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @charset "UTF-8";

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    color: #111;
    font-family: Arial, Helvetica, sans-serif;
}

html, body {
    height: 100%;

    body {
        display: flex;
        justify-content: center;
        align-items: center;
    }
}

:root {
    --card-width: 600px;
    --reverse-card: calc(var(--card-width) * -1);
}

/* 캐러셀 */
.carousel {
    position: relative;
    width: var(--card-width);
    height: 400px;
    overflow: hidden;

    .card_wrap {
        position: absolute;
        width: calc(100% * 8);
        height: 100%;
        display: flex;
        &.card1 { left: var(--reverse-card); }
        &.card2 { left: calc(var(--reverse-card) * 5); visibility: hidden; }
        transition: .3s ease-in-out;

        .card {
            width: var(--card-width);
            height: 100%;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
        }
    }
}

/* 컨트롤러 */
label {
    position: absolute;
    top: 50%;
    &.left { left: 15%; }
    &.right { right: 15%; }
    width: 50px;
    aspect-ratio: 1;
    background-color: lightgray;
    border-radius: 100%;
    /* display: grid; */
    place-items: center;
    font-size: 1.5rem;
    cursor: pointer;
    z-index: 3;
    &:hover { background-color: gray; color: #eee; }
    display: none;
}

#car_1:checked ~ .controls .car_9,
#car_1:checked ~ .controls .car_10,
#car_3:checked ~ .controls .car_1,
#car_3:checked ~ .controls .car_2,
#car_5:checked ~ .controls .car_3,
#car_5:checked ~ .controls .car_4,
#car_7:checked ~ .controls .car_5,
#car_7:checked ~ .controls .car_6,
#car_9:checked ~ .controls .car_7,
#car_9:checked ~ .controls .car_8,

#car_2:checked ~ .controls .car_3,
#car_2:checked ~ .controls .car_4,
#car_4:checked ~ .controls .car_5,
#car_4:checked ~ .controls .car_6,
#car_6:checked ~ .controls .car_7,
#car_6:checked ~ .controls .car_8,
#car_8:checked ~ .controls .car_9,
#car_8:checked ~ .controls .car_10,
#car_10:checked ~ .controls .car_1,
#car_10:checked ~ .controls .car_2
{
    display: grid;
}

#car_2:checked ~ .controls .car_2,

{

/* 다음 */
#car_2:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 2); }
#car_4:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 3); }
#car_6:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 4); }
#car_6:checked ~ .carousel .card2 { left: calc(var(--reverse-card) * 4); }
#car_8:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 0); }
#car_8:checked ~ .carousel .card2 { left: calc(var(--reverse-card) * 5); }
#car_10:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 1); }
#car_10:checked ~ .carousel .card2 { left: calc(var(--reverse-card) * 6); }

/* 이전 */
#car_1:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 0); }
#car_3:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 1); }
#car_5:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 2); }
#car_7:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 3); }
#car_9:checked ~ .carousel .card1 { left: calc(var(--reverse-card) * 4); }
#car_9:checked ~ .carousel .card2 { left: calc(var(--reverse-card) * 4); }

#car_8:checked ~ .carousel .card2,
#car_10:checked ~ .carousel .card1,
#car_9:checked ~ .carousel .card2,
#car_7:checked ~ .carousel .card1
{
    z-index: 1;
    visibility: visible;
}

#car_8:checked ~ .carousel .card1,
#car_10:checked ~ .carousel .card2,
#car_9:checked ~ .carousel .card1,
#car_7:checked ~ .carousel .card2
{
    transition: .05s;
    visibility: hidden;
}
    </style>
</head>
<body>
    <!DOCTYPE html>
