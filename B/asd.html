<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
/* ===================================== */
/*               추천도서                */
/* ===================================== */
#recommend input { display: none; }

#recommend .section-inner {
    position: relative;
}

.book-slider-wrap {
    overflow: hidden;
    width: 100%;
}

.book-slider {
    display: flex;
    transition: transform 0.4s ease;
    width: calc(100% * 7);
}

.book-item {
    width: calc(100% / 7);
    display: flex;
    gap: 4em;
    align-items: center;
    padding: 2em 0;
}

.book-item img {
    width: 18em;
    height: 25em;
    object-fit: cover;
    border-radius: 8px;
    box-shadow: 4px 4px 16px rgba(0,0,0,0.15);
    flex-shrink: 0;
}

.book-info {
    display: flex;
    flex-direction: column;
    gap: 0.8em;
}

.book-info h3 {
    font-size: 1.8em;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.4;
}

.book-info p {
    font-size: 1em;
    color: var(--accent);
}

.book-info span {
    font-size: 0.95em;
    color: #888;
}

/* 슬라이드 이동 */
#book1:checked ~ .book-slider-wrap .book-slider { transform: translateX(0%); }
#book2:checked ~ .book-slider-wrap .book-slider { transform: translateX(calc(-100% / 7)); }
#book3:checked ~ .book-slider-wrap .book-slider { transform: translateX(calc(-200% / 7)); }
#book4:checked ~ .book-slider-wrap .book-slider { transform: translateX(calc(-300% / 7)); }
#book5:checked ~ .book-slider-wrap .book-slider { transform: translateX(calc(-400% / 7)); }
#book6:checked ~ .book-slider-wrap .book-slider { transform: translateX(calc(-500% / 7)); }
#book7:checked ~ .book-slider-wrap .book-slider { transform: translateX(calc(-600% / 7)); }

/* 버튼 */
.book-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2em;
    margin-top: 1em;
}

.book-btns {
    display: flex;
    gap: 0.5em;
}

.book-prev,
.book-next {
    display: none;
    width: 2.5em;
    height: 2.5em;
    border-radius: 50%;
    border: 1px solid var(--mustard);
    color: var(--mustard);
    font-size: 1.5em;
    cursor: pointer;
    text-align: center;
    align-content: center;
    transition: 0.2s;
}

.book-prev:hover,
.book-next:hover {
    background: var(--mustard);
    color: #fff;
}

/* 현재 슬라이드에 맞는 버튼만 표시 */
#book1:checked ~ .book-controls .book-btns label:nth-child(1),
#book1:checked ~ .book-controls .book-btns label:nth-child(8) { display: flex; }

#book2:checked ~ .book-controls .book-btns label:nth-child(2),
#book2:checked ~ .book-controls .book-btns label:nth-child(9) { display: flex; }

#book3:checked ~ .book-controls .book-btns label:nth-child(3),
#book3:checked ~ .book-controls .book-btns label:nth-child(10) { display: flex; }

#book4:checked ~ .book-controls .book-btns label:nth-child(4),
#book4:checked ~ .book-controls .book-btns label:nth-child(11) { display: flex; }

#book5:checked ~ .book-controls .book-btns label:nth-child(5),
#book5:checked ~ .book-controls .book-btns label:nth-child(12) { display: flex; }

#book6:checked ~ .book-controls .book-btns label:nth-child(6),
#book6:checked ~ .book-controls .book-btns label:nth-child(13) { display: flex; }

#book7:checked ~ .book-controls .book-btns label:nth-child(7),
#book7:checked ~ .book-controls .book-btns label:nth-child(14) { display: flex; }

/* 카운터 */
.book-counter {
    font-size: 1em;
    color: #888;
}

.book-counter .cur { display: none; }
.book-counter .total { color: var(--dark); font-weight: 500; }

#book1:checked ~ .book-controls .book-counter .cur:nth-child(1) { display: inline; color: var(--dark); font-weight: 500; }
#book2:checked ~ .book-controls .book-counter .cur:nth-child(2) { display: inline; color: var(--dark); font-weight: 500; }
#book3:checked ~ .book-controls .book-counter .cur:nth-child(3) { display: inline; color: var(--dark); font-weight: 500; }
#book4:checked ~ .book-controls .book-counter .cur:nth-child(4) { display: inline; color: var(--dark); font-weight: 500; }
#book5:checked ~ .book-controls .book-counter .cur:nth-child(5) { display: inline; color: var(--dark); font-weight: 500; }
#book6:checked ~ .book-controls .book-counter .cur:nth-child(6) { display: inline; color: var(--dark); font-weight: 500; }
#book7:checked ~ .book-controls .book-counter .cur:nth-child(7) { display: inline; color: var(--dark); font-weight: 500; }
    </style>
</head>
<body>
<!-- 추천도서 -->
<section id="recommend">
    <h2 class="section-title">추천도서</h2>
    <div class="section-inner">

        <input type="radio" name="book" id="book1" checked>
        <input type="radio" name="book" id="book2">
        <input type="radio" name="book" id="book3">
        <input type="radio" name="book" id="book4">
        <input type="radio" name="book" id="book5">
        <input type="radio" name="book" id="book6">
        <input type="radio" name="book" id="book7">

        <div class="book-slider-wrap">
            <div class="book-slider">
                <div class="book-item">
                    <img src="추천도서/추천도서1.jpg" alt="나에게 나다움을 주기로 했다">
                    <div class="book-info">
                        <h3>나에게 나다움을 주기로 했다</h3>
                        <p>나다움을 찾아가는 다섯 가지 마음 습관</p>
                        <span>지은이 : 고정욱</span>
                    </div>
                </div>
                <div class="book-item">
                    <img src="추천도서/추천도서2.jpg" alt="여름이 반짝">
                    <div class="book-info">
                        <h3>여름이 반짝</h3>
                        <p></p>
                        <span>지은이 : 김수빈</span>
                    </div>
                </div>
                <div class="book-item">
                    <img src="추천도서/추천도서3.jpg" alt="사랑 한 꼬집을 넣으면">
                    <div class="book-info">
                        <h3>사랑 한 꼬집을 넣으면</h3>
                        <p></p>
                        <span>지은이 : 배리 팀스</span>
                    </div>
                </div>
                <div class="book-item">
                    <img src="추천도서/추천도서4.jpg" alt="정말 정말 소리 지르고 싶어!">
                    <div class="book-info">
                        <h3>정말 정말 소리 지르고 싶어!</h3>
                        <p></p>
                        <span>지은이 : 사이먼 필립</span>
                    </div>
                </div>
                <div class="book-item">
                    <img src="추천도서/추천도서5.jpg" alt="힐빌리의 노래">
                    <div class="book-info">
                        <h3>힐빌리의 노래</h3>
                        <p>위기의 가정과 문화에 대한 회고</p>
                        <span>지은이 : J.D 밴스</span>
                    </div>
                </div>
                <div class="book-item">
                    <img src="추천도서/추천도서6.jpg" alt="커피 한잔 할까요?">
                    <div class="book-info">
                        <h3>(허영만의) 커피 한잔 할까요?</h3>
                        <p></p>
                        <span>지은이 : 허영만</span>
                    </div>
                </div>
                <div class="book-item">
                    <img src="추천도서/추천도서7.jpg" alt="두더지의 여름">
                    <div class="book-info">
                        <h3>두더지의 여름</h3>
                        <p>김상근 그림책</p>
                        <span>지은이 : 김상근</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="book-controls">
            <div class="book-btns">
                <label class="book-prev" for="book7">&#8249;</label>
                <label class="book-prev" for="book1">&#8249;</label>
                <label class="book-prev" for="book2">&#8249;</label>
                <label class="book-prev" for="book3">&#8249;</label>
                <label class="book-prev" for="book4">&#8249;</label>
                <label class="book-prev" for="book5">&#8249;</label>
                <label class="book-prev" for="book6">&#8249;</label>

                <label class="book-next" for="book2">&#8250;</label>
                <label class="book-next" for="book3">&#8250;</label>
                <label class="book-next" for="book4">&#8250;</label>
                <label class="book-next" for="book5">&#8250;</label>
                <label class="book-next" for="book6">&#8250;</label>
                <label class="book-next" for="book7">&#8250;</label>
                <label class="book-next" for="book1">&#8250;</label>
            </div>
            <div class="book-counter">
                <span class="cur">1</span>
                <span class="cur">2</span>
                <span class="cur">3</span>
                <span class="cur">4</span>
                <span class="cur">5</span>
                <span class="cur">6</span>
                <span class="cur">7</span>
                / <span class="total">7</span>
            </div>
        </div>

    </div>
</section>
</body>
</html>
